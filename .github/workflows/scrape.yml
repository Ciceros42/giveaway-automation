name: Scrape Deals

on:
  schedule:
    - cron: '0 1,13 * * *'  # 6am and 6pm MST (UTC-7)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrapers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python -m scrapers.run_all

      - name: Alert on failure
        if: failure()
        env:
          DIGEST_EMAIL: ${{ secrets.ENTRY_EMAIL_1 }}
          DIGEST_APP_PASSWORD: ${{ secrets.GMAIL_ACCOUNT_1_APP_PASSWORD }}
        run: python -m utils.alert "${{ github.workflow }}" "${{ github.run_id }}"
